<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space gradient background -->
    <radialGradient id="bgGradient" cx="50" cy="50" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="45%" stop-color="#0E0A25"/>
      <stop offset="100%" stop-color="#06040F"/>
    </radialGradient>

    <!-- Nebula accent glow -->
    <radialGradient id="nebulaGlow" cx="50" cy="50" r="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#4A2FBF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1A0A50" stop-opacity="0"/>
    </radialGradient>

    <!-- Button face gradient — glassy depth -->
    <linearGradient id="buttonGradient" x1="50" y1="34" x2="50" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B7BFF"/>
      <stop offset="30%" stop-color="#6C5CE7"/>
      <stop offset="70%" stop-color="#4834D4"/>
      <stop offset="100%" stop-color="#3621A8"/>
    </linearGradient>

    <!-- Button inner shine -->
    <linearGradient id="buttonShine" x1="50" y1="34" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Center glow from button press -->
    <radialGradient id="pressGlow" cx="50" cy="50" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8BFFF" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#A29BFE" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#6C5CE7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4834D4" stop-opacity="0"/>
    </radialGradient>

    <!-- Wave glow gradient for left waves -->
    <linearGradient id="waveGradL" x1="30" y1="50" x2="5" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8BFFF"/>
      <stop offset="50%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>

    <!-- Wave glow gradient for right waves -->
    <linearGradient id="waveGradR" x1="70" y1="50" x2="95" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8BFFF"/>
      <stop offset="50%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>

    <!-- Outer shadow -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Soft glow filter for waves -->
    <filter id="waveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Squircle clip -->
    <clipPath id="innerClip">
      <rect x="5" y="5" width="90" height="90" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- Outer squircle -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#04030A" filter="url(#shadow)"/>

  <!-- Inner squircle with deep space gradient -->
  <rect x="5" y="5" width="90" height="90" rx="20" ry="20" fill="url(#bgGradient)"/>

  <!-- Content clipped -->
  <g clip-path="url(#innerClip)">

    <!-- Nebula background glow -->
    <circle cx="50" cy="50" r="45" fill="url(#nebulaGlow)"/>

    <!-- Stars -->
    <g fill="white">
      <circle cx="12" cy="12" r="0.5" opacity="0.6"/>
      <circle cx="28" cy="8" r="0.4" opacity="0.4"/>
      <circle cx="78" cy="14" r="0.5" opacity="0.5"/>
      <circle cx="88" cy="28" r="0.3" opacity="0.35"/>
      <circle cx="14" cy="82" r="0.4" opacity="0.4"/>
      <circle cx="22" cy="68" r="0.3" opacity="0.3"/>
      <circle cx="85" cy="75" r="0.5" opacity="0.45"/>
      <circle cx="72" cy="88" r="0.4" opacity="0.35"/>
      <circle cx="40" cy="10" r="0.3" opacity="0.3"/>
      <circle cx="62" cy="90" r="0.3" opacity="0.25"/>
      <circle cx="90" cy="50" r="0.4" opacity="0.3"/>
      <circle cx="10" cy="45" r="0.3" opacity="0.25"/>
    </g>

    <!-- Press glow behind button -->
    <circle cx="50" cy="50" r="30" fill="url(#pressGlow)"/>

    <!-- Sound waves LEFT — 5 arcs with gradient + glow, fading outward -->
    <g filter="url(#waveGlow)">
      <path d="M 28 41 Q 23 50 28 59" stroke="url(#waveGradL)" stroke-width="2.0" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M 23 36 Q 16 50 23 64" stroke="url(#waveGradL)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
      <path d="M 18 31 Q 9 50 18 69" stroke="url(#waveGradL)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
      <path d="M 13 26 Q 2 50 13 74" stroke="url(#waveGradL)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.2"/>
      <path d="M 8 21 Q -5 50 8 79" stroke="url(#waveGradL)" stroke-width="1.0" stroke-linecap="round" fill="none" opacity="0.1"/>
    </g>

    <!-- Sound waves RIGHT — 5 arcs mirrored -->
    <g filter="url(#waveGlow)">
      <path d="M 72 41 Q 77 50 72 59" stroke="url(#waveGradR)" stroke-width="2.0" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M 77 36 Q 84 50 77 64" stroke="url(#waveGradR)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
      <path d="M 82 31 Q 91 50 82 69" stroke="url(#waveGradR)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
      <path d="M 87 26 Q 98 50 87 74" stroke="url(#waveGradR)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.2"/>
      <path d="M 92 21 Q 105 50 92 79" stroke="url(#waveGradR)" stroke-width="1.0" stroke-linecap="round" fill="none" opacity="0.1"/>
    </g>

    <!-- Button shadow (depth) -->
    <rect x="36" y="40" width="28" height="24" rx="7" ry="7" fill="#1A0E45" opacity="0.6"/>

    <!-- Button body -->
    <rect x="36" y="38" width="28" height="24" rx="7" ry="7" fill="url(#buttonGradient)"/>

    <!-- Button glass shine overlay -->
    <rect x="36" y="38" width="28" height="12" rx="7" ry="7" fill="url(#buttonShine)"/>


  </g>
</svg>
